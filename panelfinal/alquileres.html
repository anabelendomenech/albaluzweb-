<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alquileres · ALBALUZ</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mobilebar">
  <div class="brand">👗 ALBALUZ</div>
  <select id="mobileNav" onchange="location.href=this.value">
    <option value="index.html">Inicio</option>
    <option value="vestidos.html">Vestidos</option>
    <option value="alquileres.html">Alquileres</option>
    <option value="clientes.html">Clientes</option>
  </select>
</div>
<div class="app">
  <aside class="sidebar">
    <div class="brand">👗 ALBALUZ</div>
    <nav>
      <a href="index.html" data-nav="index.html">🏠 Inicio</a>
      <a href="vestidos.html" data-nav="vestidos.html">🪡 Vestidos</a>
      <a href="alquileres.html" data-nav="alquileres.html">📅 Alquileres</a>
      <a href="clientes.html" data-nav="clientes.html">👥 Clientes</a>
    </nav>
    <div class="tag">Alquiler de vestidos<br>Panel de gestión</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Alquileres</h1>
        <p>Todas tus reservas</p>
      </div>
      <button class="btn gold" onclick="abrirNuevo()">+ Agregar alquiler</button>
    </div>

    <div class="search-row">
      <div class="chip active" data-f="Todos" onclick="filtrar(this)">Todos</div>
      <div class="chip" data-f="30dias" onclick="filtrar(this)">Próximos 30 días</div>
      <div class="chip" data-f="hoy" onclick="filtrar(this)">Hoy</div>
      <div class="chip" data-f="Reservado" onclick="filtrar(this)">Pronto a retirar</div>
      <div class="chip" data-f="Retirado" onclick="filtrar(this)">Retirados</div>
      <div class="chip" data-f="Devuelto" onclick="filtrar(this)">Devueltos</div>
      <div class="chip" data-f="arreglo" onclick="filtrar(this)">🧵 Para arreglar</div>
    </div>

    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th>Cliente</th><th>Vestido</th><th>Retiro</th><th>Devolución</th><th>Precio</th><th>Debe</th><th>Estado</th><th></th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal: nuevo alquiler -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Nuevo alquiler</h2>
    <form id="form">
      <div class="field autocomplete">
        <label>Cliente</label>
        <input id="cliente" autocomplete="off" placeholder="Nombre del cliente" required>
        <div class="ac-list" id="acCliente" style="display:none"></div>
      </div>
      <div class="field">
        <label>Teléfono (opcional)</label>
        <input id="telefono" placeholder="09X XXX XXX">
      </div>

      <div class="row">
        <div class="field">
          <label>Fecha de retiro</label>
          <input type="date" id="fechaRetiro" required onchange="revisarDisponibilidad()">
        </div>
        <div class="field">
          <label>Fecha de devolución</label>
          <input type="date" id="fechaDevolucion" required onchange="revisarDisponibilidad()">
        </div>
      </div>

      <div class="field autocomplete">
        <label>Vestido</label>
        <input id="vestidoBuscar" autocomplete="off" placeholder="Primero elegí las fechas, después buscá el vestido…" required>
        <div class="ac-list" id="acVestido" style="display:none"></div>
        <div class="hint" id="vestidoInfo"></div>
      </div>
      <input type="hidden" id="vestidoId">
      <input type="hidden" id="vestidoDesc">
      <div class="row">
        <div class="field">
          <label>Precio base</label>
          <input type="number" id="precioBase" oninput="calcular()">
        </div>
        <div class="field">
          <label>Descuento (%)</label>
          <input type="number" id="descuento" value="0" oninput="calcular()">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Precio final</label>
          <input type="number" id="precioFinal" readonly style="background:#f6f1ee">
        </div>
        <div class="field">
          <label>Debe $</label>
          <input type="number" id="debe" value="0">
        </div>
      </div>
      <div class="field">
        <label>Notas (opcional)</label>
        <textarea id="notas" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn gold" style="flex:1">Guardar</button>
        <button type="button" class="btn ghost" onclick="cerrarModal()">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: enviar a arreglar -->
<div class="overlay" id="overlayArreglo">
  <div class="modal">
    <h2>🧵 Enviar a arreglar</h2>
    <form id="formArreglo">
      <p class="hint" id="arregloInfo" style="margin-bottom:14px"></p>
      <div class="field">
        <label>¿Qué hay que hacerle?</label>
        <textarea id="notaArreglo" rows="3" placeholder="Ej: descoser bastilla, falta un broche…" required></textarea>
      </div>
      <input type="hidden" id="arregloAlquilerId">
      <div class="modal-actions">
        <button type="submit" class="btn gold" style="flex:1">Guardar</button>
        <button type="button" class="btn ghost" onclick="cerrarModalArreglo()">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script src="common.js"></script>
<script>
let alquileres = [], vestidos = [], clientes = [];
let filtroEstado = 'Todos';

async function cargar() {
  const [a, v, c] = await Promise.all([apiGet('getAlquileres'), apiGet('getVestidos'), apiGet('getClientes')]);
  alquileres = a.data || [];
  vestidos = v.data || [];
  clientes = c.data || [];
  render();
}

function filtrar(el) {
  document.querySelectorAll('.search-row .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filtroEstado = el.dataset.f;
  render();
}

function render() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const en30 = new Date(hoy.getTime() + 30*24*60*60*1000);

  let lista = [...alquileres].sort((a,b) => new Date(b.FechaCreacion) - new Date(a.FechaCreacion));

  lista = lista.filter(a => {
    const retiro = a.FechaRetiro ? new Date(a.FechaRetiro) : null;
    if (filtroEstado === 'arreglo') return a.ParaArreglar === 'SI';
    if (filtroEstado === 'Devuelto') return a.Estado === 'Devuelto';
    if (filtroEstado === 'Retirado') return a.Estado === 'Retirado';
    if (filtroEstado === 'Reservado') return a.Estado === 'Reservado';
    if (filtroEstado === 'hoy') return retiro && retiro.toDateString() === hoy.toDateString();
    if (filtroEstado === '30dias') return retiro && retiro >= hoy && retiro <= en30 && a.Estado !== 'Devuelto';
    return true;
  });

  const tbody = document.getElementById('tbody');
  if (!lista.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty"><h3>Sin alquileres</h3><p>Agregá el primero con el botón de arriba.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(a => {
    let accionEstado = '';
    if (a.Estado === 'Reservado') {
      accionEstado = `<button class="btn ghost sm" onclick="cambiarEstado(${a.ID},'Retirado')">Marcar retirado</button>`;
    } else if (a.Estado === 'Retirado') {
      accionEstado = `<button class="btn ghost sm" onclick="cambiarEstado(${a.ID},'Devuelto')">Marcar devuelto</button>`;
    }
    const btnArreglo = a.ParaArreglar === 'SI'
      ? `<span class="pill arreglo" title="${(a.NotaArreglo || '').replace(/"/g,'&quot;')}">🧵 Para arreglar</span>`
      : `<button class="btn ghost sm" onclick="abrirArreglo(${a.ID})">🧵 Arreglo</button>`;
    return `
    <tr>
      <td><strong>${a.Cliente}</strong>${a.Telefono ? `<br><span class="hint">${a.Telefono}</span>` : ''}</td>
      <td>#${a.VestidoID} · ${a.VestidoDesc || ''}</td>
      <td>${fmtDate(a.FechaRetiro)}</td>
      <td>${fmtDate(a.FechaDevolucion)}</td>
      <td>${fmtMoney(a.PrecioFinal)}</td>
      <td>${Number(a.Debe) > 0 ? `<span style="color:var(--warn);font-weight:600">${fmtMoney(a.Debe)}</span>` : '—'}</td>
      <td><span class="pill ${a.Estado}">${a.Estado}</span></td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">${accionEstado}${btnArreglo}</td>
    </tr>`;
  }).join('');
}

async function cambiarEstado(id, estado) {
  await apiPost('updateAlquiler', { id, estado });
  toast(estado === 'Retirado' ? 'Marcado como retirado' : 'Marcado como devuelto');
  cargar();
}

function abrirArreglo(id) {
  document.getElementById('arregloAlquilerId').value = id;
  const a = alquileres.find(x => String(x.ID) === String(id));
  document.getElementById('arregloInfo').textContent = a ? `${a.Cliente} · #${a.VestidoID} ${a.VestidoDesc || ''}` : '';
  document.getElementById('notaArreglo').value = '';
  document.getElementById('overlayArreglo').classList.add('open');
}
function cerrarModalArreglo() { document.getElementById('overlayArreglo').classList.remove('open'); }

document.getElementById('formArreglo').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('arregloAlquilerId').value;
  await apiPost('updateAlquiler', { id, paraArreglar: 'SI', notaArreglo: document.getElementById('notaArreglo').value });
  toast('Vestido marcado para arreglar');
  cerrarModalArreglo();
  cargar();
});

function abrirNuevo() {
  document.getElementById('form').reset();
  document.getElementById('vestidoId').value = '';
  document.getElementById('vestidoInfo').textContent = '';
  document.getElementById('overlay').classList.add('open');
}
function cerrarModal() { document.getElementById('overlay').classList.remove('open'); }

// ---- autocompletar vestido ----
const vestidoInput = document.getElementById('vestidoBuscar');
vestidoInput.addEventListener('input', () => {
  const q = vestidoInput.value.trim().toLowerCase();
  const box = document.getElementById('acVestido');
  document.getElementById('vestidoId').value = '';
  const retiro = document.getElementById('fechaRetiro').value;
  const devolucion = document.getElementById('fechaDevolucion').value;
  if (!retiro || !devolucion) {
    box.innerHTML = `<div class="ac-item"><span class="hint">Elegí primero las fechas de retiro y devolución.</span></div>`;
    box.style.display = 'block';
    return;
  }
  if (!q) { box.style.display = 'none'; return; }
  const res = vestidos.filter(v => `${v.ID} ${v.Descripcion}`.toLowerCase().includes(q)).slice(0, 8);
  if (!res.length) { box.style.display = 'none'; return; }
  box.innerHTML = res.map(v => {
    const ocupa = alquilerQueOcupa(v.ID, retiro, devolucion, alquileres);
    const estadoTxt = ocupa ? `🔴 ocupado hasta ${fmtDate(ocupa.FechaDevolucion)}` : `🟢 libre esas fechas · ${fmtMoney(v.Precio)}`;
    return `<div class="ac-item" onclick='elegirVestido(${JSON.stringify(v).replace(/'/g,"&#39;")})'>
      <span>#${v.ID} — ${v.Descripcion}</span>
      <small>${estadoTxt}</small>
    </div>`;
  }).join('');
  box.style.display = 'block';
});

function elegirVestido(v) {
  document.getElementById('vestidoBuscar').value = `#${v.ID} — ${v.Descripcion}`;
  document.getElementById('vestidoId').value = v.ID;
  document.getElementById('vestidoDesc').value = v.Descripcion;
  document.getElementById('precioBase').value = v.Precio || 0;
  document.getElementById('acVestido').style.display = 'none';
  revisarDisponibilidad();
  calcular();
}

function revisarDisponibilidad() {
  const info = document.getElementById('vestidoInfo');
  const vestidoId = document.getElementById('vestidoId').value;
  if (!vestidoId) { info.textContent = ''; return; }
  const retiro = document.getElementById('fechaRetiro').value;
  const devolucion = document.getElementById('fechaDevolucion').value;
  if (!retiro || !devolucion) { info.textContent = ''; return; }
  const ocupa = alquilerQueOcupa(vestidoId, retiro, devolucion, alquileres);
  info.innerHTML = ocupa
    ? `<span style="color:var(--warn);font-weight:600">⚠️ Este vestido ya está reservado del ${fmtDate(ocupa.FechaRetiro)} al ${fmtDate(ocupa.FechaDevolucion)} — elegí otras fechas u otro vestido.</span>`
    : `<span style="color:var(--ok)">✓ Disponible para esas fechas</span>`;
}

// ---- autocompletar cliente ----
const clienteInput = document.getElementById('cliente');
clienteInput.addEventListener('input', () => {
  const q = clienteInput.value.trim().toLowerCase();
  const box = document.getElementById('acCliente');
  if (!q) { box.style.display = 'none'; return; }
  const res = clientes.filter(c => (c.Nombre || '').toLowerCase().includes(q)).slice(0, 6);
  if (!res.length) { box.style.display = 'none'; return; }
  box.innerHTML = res.map(c => `<div class="ac-item" onclick='elegirCliente(${JSON.stringify(c).replace(/'/g,"&#39;")})'><span>${c.Nombre}</span><small>${c.Telefono || ''}</small></div>`).join('');
  box.style.display = 'block';
});
function elegirCliente(c) {
  document.getElementById('cliente').value = c.Nombre;
  document.getElementById('telefono').value = c.Telefono || '';
  document.getElementById('acCliente').style.display = 'none';
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete')) {
    document.getElementById('acVestido').style.display = 'none';
    document.getElementById('acCliente').style.display = 'none';
  }
});

function calcular() {
  const base = Number(document.getElementById('precioBase').value) || 0;
  const desc = Number(document.getElementById('descuento').value) || 0;
  document.getElementById('precioFinal').value = Math.round(base * (1 - desc / 100));
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!document.getElementById('vestidoId').value) {
    toast('Elegí un vestido de la lista');
    return;
  }
  const vestidoId = document.getElementById('vestidoId').value;
  const retiro = document.getElementById('fechaRetiro').value;
  const devolucion = document.getElementById('fechaDevolucion').value;
  const ocupa = alquilerQueOcupa(vestidoId, retiro, devolucion, alquileres);
  if (ocupa) {
    toast('Ese vestido ya está reservado en esas fechas');
    return;
  }
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Guardando…';
  try {
    await apiPost('addAlquiler', {
      cliente: document.getElementById('cliente').value,
      telefono: document.getElementById('telefono').value,
      vestidoId: document.getElementById('vestidoId').value,
      vestidoDesc: document.getElementById('vestidoDesc').value,
      fechaRetiro: document.getElementById('fechaRetiro').value,
      fechaDevolucion: document.getElementById('fechaDevolucion').value,
      precioBase: document.getElementById('precioBase').value,
      descuento: document.getElementById('descuento').value,
      precioFinal: document.getElementById('precioFinal').value,
      debe: document.getElementById('debe').value,
      notas: document.getElementById('notas').value
    });
    toast('Alquiler guardado');
    cerrarModal();
    await cargar();
  } catch (err) {
    toast('Error al guardar. Intentá de nuevo.');
    console.error(err);
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar';
  }
});

cargar();
</script>
</body>
</html>
